name: Weekly Portfolio Stock Analysis

on:
  schedule:
    # Runs every Saturday at 00:00 UTC (5:30 AM IST)
    - cron: '0 0 * * 3,6'
  workflow_dispatch: # Allows manual trigger via GitHub UI

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing report updates back to the repo

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Analysis Model
      id: run_script
      run: python analysis.py

    - name: Commit and Push Report
      run: |
        git config --global user.name "Portfolio Automation Bot"
        git config --global user.email "bot@github.com"
        # UPDATED: Added tracking file target to git tracking engine
        git add reports/*.md README.md re-engineering.csv || true
        git diff-index --quiet HEAD || git commit -m "Automated Weekly Report Update: $(date +'%Y-%m-%d')"
        git push

    - name: Send Summary Table to Telegram via Curl
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
          -d "parse_mode=Markdown" \
          --data-urlencode "text=${{ steps.run_script.outputs.TELEGRAM_SUMMARY }}"
