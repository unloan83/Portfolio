name: Weekly Portfolio Stock Analysis

on:
  schedule:
    # Runs every Saturday at 00:00 UTC (5:30 AM IST)
    - cron: '0 0 * * 6'
  workflow_dispatch: # Allows manual trigger via GitHub UI

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing report updates back to the repo

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance lxml tabulate

    - name: Run Analysis Model
      run: python analysis.py

    - name: Commit and Push Report
      run: |
        git config --global user.name "Portfolio Automation Bot"
        git config --global user.email "bot@github.com"
        git add reports/*.md README.md || true
        # Commit only if files have structural updates
        git diff-index --quiet HEAD || git commit -m "Automated Weekly Report Update: $(date +'%Y-%m-%d')"
        git push

    - name: Send Notification to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🚀 Portfolio Analysis Complete!
          
          Your weekly stock portfolio evaluation has been compiled successfully. 
          Check your GitHub repository homepage to review the updated Buy/Sell/Hold signals and structural reports.
